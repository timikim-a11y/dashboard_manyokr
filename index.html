<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광고 성과 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg-0:#ffffff;--bg-1:#fafaf6;--bg-2:#f5f5f0;--bg-3:#eeeeea;--bg-4:#e8e8e2;--border-0:#e0e0d8;--border-1:#d0d0c8;--text-0:#151515;--text-1:#333333;--text-2:#666660;--text-3:#999990;--olive:#c8d820;--olive-dim:rgba(245,255,80,0.15);--naver:#1ec965;--naver-dim:rgba(30,201,101,0.1);--official:#7c6cf6;--official-dim:rgba(124,108,246,0.1);--etc:#b4b4a0;--etc-dim:rgba(180,180,160,0.15);--blue:#4d8cf5;--positive:#2aaa5a;--negative:#e04040;--warn:#d4a010;--brand-point:rgb(245,255,80);--brand-black:#151515;--mono:'JetBrains Mono',monospace;--sans:'Noto Sans KR',sans-serif;--radius:10px;--radius-sm:6px}
*{margin:0;padding:0;box-sizing:border-box}html{font-size:13px}body{font-family:var(--sans);background:var(--bg-0);color:var(--text-0);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg-1)}::-webkit-scrollbar-thumb{background:var(--border-1);border-radius:3px}
.overlay{position:fixed;inset:0;background:rgba(21,21,21,0.4);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal{background:var(--bg-2);border:1px solid var(--border-1);border-radius:16px;padding:40px;max-width:400px;width:90%;text-align:center}
.modal h2{font-size:20px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:10px}
.modal p{color:var(--text-2);font-size:12px;margin-bottom:20px}
.modal input{width:100%;background:var(--bg-0);border:1px solid var(--border-1);color:var(--text-0);padding:12px;border-radius:var(--radius-sm);font-size:14px;outline:none;text-align:center;margin-bottom:12px}
.modal input:focus{border-color:var(--olive)}
.modal-btn{width:100%;padding:13px;background:var(--brand-point);color:var(--brand-black);border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer}
.modal-btn:hover{filter:brightness(1.1)}.modal-msg{font-size:11px;margin-top:10px;min-height:16px}
.hdr-dot{width:7px;height:7px;background:var(--olive);border-radius:50%;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.header{background:var(--bg-1);border-bottom:1px solid var(--border-0);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:10px}.header-title{font-size:16px;font-weight:800}
.header-right{display:flex;align-items:center;gap:10px}
.hdr-status{font-size:10px;color:var(--text-3);font-family:var(--mono)}
.btn-sm{background:var(--bg-3);border:1px solid var(--border-0);color:var(--text-2);height:30px;padding:0 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-family:var(--sans);display:flex;align-items:center;gap:4px}
.btn-sm:hover{background:var(--bg-4);color:var(--text-0)}
.tabs{display:flex;background:var(--bg-1);border-bottom:1px solid var(--border-0);padding:0 28px;overflow-x:auto;gap:2px}
.tab{padding:10px 18px;font-size:12px;font-weight:600;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;user-select:none}
.tab:hover{color:var(--text-2)}.tab.active{color:var(--text-0);border-bottom-color:var(--olive)}
.content{padding:20px 28px;max-width:1580px;margin:0 auto}
.tab-pane{display:none}.tab-pane.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.ym-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.ym-label{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-right:4px}
.ym-btn{background:var(--bg-3);border:1px solid var(--border-0);color:var(--text-2);padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:11px;font-weight:600;user-select:none}
.ym-btn:hover{background:var(--bg-4)}.ym-btn.active{background:var(--olive-dim);color:var(--olive);border-color:var(--olive)}
.ym-sep{width:1px;height:20px;background:var(--border-0);margin:0 4px}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end}
.f-group{display:flex;flex-direction:column;gap:3px}
.f-label{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px}
.f-sep{color:var(--text-3);font-size:11px}
select,input[type=date]{background:var(--bg-3);border:1px solid var(--border-0);color:var(--text-0);padding:7px 10px;border-radius:var(--radius-sm);font-size:12px;font-family:var(--sans);outline:none;cursor:pointer;min-width:100px}
select:focus,input[type=date]:focus{border-color:var(--olive)}
.card{background:var(--bg-2);border:1px solid var(--border-0);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.card-h{font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:1100px){.g2,.g3,.g4{grid-template-columns:1fr}.content{padding:14px}}
.kpi{background:var(--bg-2);border:1px solid var(--border-0);border-radius:var(--radius);padding:14px 16px}
.kpi-l{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.kpi-v{font-size:18px;font-weight:800;letter-spacing:-.3px;font-family:var(--mono)}
.kpi-sub{font-size:10px;color:var(--text-3);margin-top:2px}
.metric-toggles{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.mt-btn{font-size:10px;font-weight:600;padding:4px 10px;border-radius:12px;cursor:pointer;border:1px solid var(--border-0);background:var(--bg-3);color:var(--text-2);user-select:none}
.mt-btn.on{background:var(--olive-dim);color:var(--olive);border-color:var(--olive)}
.tgl-btn{background:none;border:1px solid var(--border-0);color:var(--text-3);padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:11px;font-weight:600;margin-top:10px;display:inline-flex;align-items:center;gap:4px}
.tgl-btn:hover{color:var(--text-1);border-color:var(--border-1)}
.tgl-body{display:none;margin-top:10px}.tgl-body.open{display:block;animation:fadeIn .2s ease}
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border-0)}
table{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap}
thead th{background:var(--bg-1);color:var(--text-3);font-weight:600;text-transform:uppercase;font-size:9px;letter-spacing:.5px;padding:8px 10px;text-align:right;border-bottom:1px solid var(--border-0);position:sticky;top:0;cursor:pointer;user-select:none}
thead th:first-child{text-align:left}
tbody td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--border-0);color:var(--text-2);font-family:var(--mono);font-size:11px}
tbody td:first-child{text-align:left;font-family:var(--sans);color:var(--text-1);font-weight:500}
tbody tr:hover td{background:var(--bg-3)}
tbody tr.sum td{background:rgba(245,255,80,.15);color:var(--text-0);font-weight:700}
tbody tr.sum td:first-child{color:var(--olive)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.b-ol{background:var(--olive-dim);color:var(--olive)}.b-nv{background:var(--naver-dim);color:var(--naver)}.b-of{background:var(--official-dim);color:var(--official)}.b-et{background:var(--etc-dim);color:var(--etc)}
.section-t{font-size:14px;font-weight:700;margin:20px 0 10px}
.no-data{text-align:center;padding:40px;color:var(--text-3);font-size:12px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px}
.spin{width:28px;height:28px;border:2.5px solid var(--border-1);border-top-color:var(--olive);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-t{font-size:12px;color:var(--text-3)}
.rank-search{width:100%;padding:10px 14px;border:1px solid var(--border-0);border-radius:var(--radius-sm);background:var(--bg-3);font-size:13px;font-family:var(--sans);color:var(--text-0);outline:none;margin-bottom:12px}
.rank-search:focus{border-color:var(--olive)}
.rank-highlight{background:rgba(245,255,80,.35);font-weight:700}
.rank-mw{background:rgba(200,50,80,0.12);color:#c83250;font-weight:800}
</style>
</head>
<body>

<div class="overlay" id="loginOverlay">
  <div class="modal">
    <h2><span class="hdr-dot"></span>대시보드 로그인</h2>
    <p>비밀번호를 입력하세요.</p>
    <input type="password" id="loginPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')checkLogin()"/>
    <button class="modal-btn" onclick="checkLogin()">로그인</button>
    <div class="modal-msg" id="loginMsg"></div>
  </div>
</div>

<div class="header">
  <div class="header-left"><span class="hdr-dot"></span><span class="header-title">광고 성과 대시보드</span></div>
  <div class="header-right">
    <span class="hdr-status" id="lastUpd">-</span>
    <button class="btn-sm" onclick="loadAllData()">↻ 새로고침</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="summary">Summary</div>
  <div class="tab" data-tab="kpi">KPI</div>
  <div class="tab" data-tab="oliveyoung">올리브영</div>
  <div class="tab" data-tab="oyrank">OY 브랜드랭킹</div>
  <div class="tab" data-tab="naver">네이버</div>
  <div class="tab" data-tab="official">공식몰</div>
  <div class="tab" data-tab="compare">기간 비교</div>
</div>

<div class="content">
  <div class="tab-pane active" id="tab-summary"></div>
  <div class="tab-pane" id="tab-kpi"></div>
  <div class="tab-pane" id="tab-oliveyoung"></div>
  <div class="tab-pane" id="tab-oyrank"></div>
  <div class="tab-pane" id="tab-naver"></div>
  <div class="tab-pane" id="tab-official"></div>
  <div class="tab-pane" id="tab-compare"></div>
</div>

<script>
// ★ API URL 고정 (비밀번호는 서버에서만 검증 - F12로 비밀번호 노출 없음)
const API_URL = 'https://script.google.com/macros/s/AKfycbySQ0UUVlLeFydOFBpPzDgf-ENngvPRSMYq02A8-nhenaA8MLKdQUoNAdx6nZN-__0C/exec';
let TOKEN = sessionStorage.getItem('db_token') || '';

// ★ 로그인 - 서버에서 비밀번호 검증
async function checkLogin() {
  const pw = document.getElementById('loginPw').value;
  const msg = document.getElementById('loginMsg');
  msg.textContent = '확인 중...'; msg.style.color = 'var(--text-3)';
  try {
    const res = await fetch(API_URL + '?action=auth&pw=' + encodeURIComponent(pw));
    const d = await res.json();
    if (d.ok) {
      TOKEN = d.token;
      sessionStorage.setItem('db_token', TOKEN);
      sessionStorage.setItem('db_logged', '1');
      document.getElementById('loginOverlay').style.display = 'none';
      loadAllData();
    } else {
      msg.textContent = d.message || '비밀번호가 틀렸습니다.';
      msg.style.color = 'var(--negative)';
    }
  } catch(e) {
    msg.textContent = '서버 오류. 잠시 후 다시 시도해주세요.';
    msg.style.color = 'var(--negative)';
  }
}

function checkSession() {
  TOKEN = sessionStorage.getItem('db_token') || '';
  if (sessionStorage.getItem('db_logged') === '1' && TOKEN) {
    document.getElementById('loginOverlay').style.display = 'none';
    return true;
  }
  return false;
}

document.addEventListener('DOMContentLoaded', () => {
  if (checkSession()) loadAllData();
});

// ★ 데이터 로드 (토큰 포함)
async function fetchAllDataAPI() {
  try {
    const res = await fetch(API_URL + '?action=data&token=' + TOKEN);
    const json = await res.json();
    if (!json.ok) {
      if (json.message === '인증이 필요합니다.') { sessionStorage.clear(); location.reload(); }
      return {};
    }
    return json.data || {};
  } catch(e) { console.error('API 오류:', e); return {}; }
}

// ─── CONSTANTS ───
const CHS = ['oliveyoung','naver','official','etc'];
const CN = {oliveyoung:'올리브영',naver:'네이버',official:'공식몰',etc:'기타채널'};
const CC = {oliveyoung:{b:'b-ol'},naver:{b:'b-nv'},official:{b:'b-of'},etc:{b:'b-et'}};

// 광고 집계 시트 컬럼 (AD_HEADERS)
// 기간(0) 채널(1) 매체명(2) cat.(3) 캠페인명(4)
// 도달(5) 노출(6) 클릭(7) vat-(8) vat+(9) FEE(10)
// 장바구니(11) 장바구니전환값(12) 구매(13) 구매전환값(14)
// CTR(15) CPM(16) CPC(17) CVR장바구니(18) CVR구매(19)
// CPA장바구니(20) CPA구매(21) ROAS장바구니(22) ROAS구매(23)
const AI = {date:0,ch:1,media:2,cat:3,camp:4,reach:5,imp:6,click:7,vatM:8,vatP:9,fee:10,cart:11,cartV:12,pur:13,purV:14};
// 매출 시트: 기간(0) sell-in(1) sell-out온라인(2) sell-out오프라인(3) sell-out전체(4)
const SI = {date:0,sellIn:1,sellOn:2,sellOff:3,sellOut:4};

let RAW = {}, charts = {}, toggleStates = {};

const GM_ALL = [
  {k:'sellIn',l:'매출(SELL-IN)',color:'#4d8cf5',type:'bar'},
  {k:'sellOut',l:'매출(SELL-OUT)',color:'#1a2d5a',type:'bar'},
  {k:'vatP',l:'광고비',color:'#a855f7',type:'bar'},
  {k:'purV',l:'광고매출',color:'#1ec965',type:'bar'},
  {k:'roasP',l:'광고 ROAS',color:'#e6a620',type:'line',yAxis:'y1',pct:true},
  {k:'adRatio',l:'광고비 비중',color:'#f05252',type:'line',yAxis:'y1',pct:true},
  {k:'imp',l:'노출',color:'#999990',type:'bar',hide:true},
  {k:'click',l:'클릭',color:'#b4b4a0',type:'bar',hide:true},
];
const GM_NOSO = [
  {k:'sellIn',l:'매출',color:'#4d8cf5',type:'bar'},
  {k:'vatP',l:'광고비',color:'#a855f7',type:'bar'},
  {k:'purV',l:'광고매출',color:'#1ec965',type:'bar'},
  {k:'roasP',l:'광고 ROAS',color:'#e6a620',type:'line',yAxis:'y1',pct:true},
  {k:'adRatio',l:'광고비 비중',color:'#f05252',type:'line',yAxis:'y1',pct:true},
  {k:'imp',l:'노출',color:'#999990',type:'bar',hide:true},
];

// ─── UTILS ───
function G(id){return document.getElementById(id)}
function pn(v){if(v==null||v==='')return 0;if(typeof v==='number')return v;return parseFloat(String(v).replace(/[,₩\s%]/g,''))||0}
function pd(v){if(!v)return null;const s=String(v).trim();const m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);return m?new Date(+m[1],+m[2]-1,+m[3]):null}
function ds(d){return d?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`:''}
function fn(n){return n==null||isNaN(n)?'-':Math.round(n).toLocaleString('ko-KR')}
function fw(n){return fn(n)}
function fp(n){return n==null||isNaN(n)||!isFinite(n)?'-':(n*100).toFixed(2)+'%'}
function killChart(id){if(charts[id]){charts[id].destroy();delete charts[id]}}
function parseSheet(s){return s?(s.rows||[]).map(r=>Object.values(r)):[];}

function sumAd(rows){
  const m={reach:0,imp:0,click:0,vatM:0,vatP:0,fee:0,cart:0,cartV:0,pur:0,purV:0,sellIn:0,sellOut:0};
  rows.forEach(r=>{m.reach+=pn(r[AI.reach]);m.imp+=pn(r[AI.imp]);m.click+=pn(r[AI.click]);m.vatM+=pn(r[AI.vatM]);m.vatP+=pn(r[AI.vatP]);m.fee+=pn(r[AI.fee]);m.cart+=pn(r[AI.cart]);m.cartV+=pn(r[AI.cartV]);m.pur+=pn(r[AI.pur]);m.purV+=pn(r[AI.purV])});
  m.ctr=m.imp>0?m.click/m.imp:0;m.cpc=m.click>0?m.vatP/m.click:0;m.cpm=m.imp>0?m.vatP/m.imp*1000:0;
  m.cvrC=m.click>0?m.cart/m.click:0;m.cvrP=m.click>0?m.pur/m.click:0;
  m.cpaC=m.cart>0?m.vatP/m.cart:0;m.cpaP=m.pur>0?m.vatP/m.pur:0;
  m.roasC=m.vatP>0?m.cartV/m.vatP:0;m.roasP=m.vatP>0?m.purV/m.vatP:0;
  m.avgC=m.cart>0?m.cartV/m.cart:0;m.avgP=m.pur>0?m.purV/m.pur:0;
  m.adRatio=m.sellOut>0?m.vatP/m.sellOut:(m.sellIn>0?m.vatP/m.sellIn:0);
  return m;
}

function fym(rows,year,month){return rows.filter(r=>{const d=pd(r[0]);if(!d)return false;if(year&&d.getFullYear()!==year)return false;if(month&&(d.getMonth()+1)!==month)return false;return true})}
function fch(rows,ch){return !ch||ch==='all'?rows:rows.filter(r=>String(r[AI.ch]||'').includes(ch))}
function fmedia(rows,v){return !v||v==='all'?rows:rows.filter(r=>String(r[AI.media]||'').trim()===v)}
function fcat(rows,v){return !v||v==='all'?rows:rows.filter(r=>String(r[AI.cat]||'').trim()===v)}
function fcamp(rows,v){return !v||v==='all'?rows:rows.filter(r=>String(r[AI.camp]||'').trim()===v)}
function uq(rows,col){const s=new Set();rows.forEach(r=>{const v=String(r[col]||'').trim();if(v&&v!=='undefined')s.add(v)});return[...s].sort()}
function getYears(rows){const s=new Set();rows.forEach(r=>{const d=pd(r[0]);if(d)s.add(d.getFullYear())});return[...s].sort()}
function getMonths(rows,y){const s=new Set();rows.forEach(r=>{const d=pd(r[0]);if(d&&d.getFullYear()===y)s.add(d.getMonth()+1)});return[...s].sort((a,b)=>a-b)}
function sumSales(rows,year,month){let si=0,so=0;fym(rows,year,month).forEach(r=>{si+=pn(r[SI.sellIn]);so+=pn(r[SI.sellOut])});return{sellIn:si,sellOut:so}}

// ─── YM BAR ───
function renderYMBar(cid,rows,cb){
  const years=getYears(rows);
  if(!years.length){if(G(cid))G(cid).innerHTML='';return{getSelection:()=>({year:null,month:null})}}
  let selY=years[years.length-1],selM=null;
  function render(){
    const months=getMonths(rows,selY);
    let h='<div class="ym-bar"><span class="ym-label">연도</span>';
    years.forEach(y=>h+=`<div class="ym-btn ${y===selY?'active':''}" data-y="${y}">${y}년</div>`);
    h+=`<div class="ym-sep"></div><span class="ym-label">월</span><div class="ym-btn ${!selM?'active':''}" data-m="all">전체</div>`;
    months.forEach(m=>h+=`<div class="ym-btn ${m===selM?'active':''}" data-m="${m}">${m}월</div>`);
    h+='</div>';
    const el=G(cid);if(!el)return;el.innerHTML=h;
    el.querySelectorAll('[data-y]').forEach(b=>b.addEventListener('click',()=>{selY=parseInt(b.dataset.y);selM=null;render();cb(selY,selM)}));
    el.querySelectorAll('[data-m]').forEach(b=>b.addEventListener('click',()=>{selM=b.dataset.m==='all'?null:parseInt(b.dataset.m);render();cb(selY,selM)}));
  }

function mkMixed(cid,tid,labels,dbm,prefix,GM){
  if(!toggleStates[prefix]){const s={};GM.forEach(g=>s[g.k]=!g.hide);toggleStates[prefix]=s}
  const st=toggleStates[prefix];
  let tH='<div class="metric-toggles">';
  GM.forEach(gm=>tH+=`<div class="mt-btn ${st[gm.k]?'on':''}" data-mk="${gm.k}" data-pf="${prefix}" style="${st[gm.k]?`border-color:${gm.color};color:${gm.color}`:''}">${gm.l}</div>`);
  tH+='</div>';
  const tEl=G(tid);if(tEl)tEl.innerHTML=tH;
  tEl?.querySelectorAll('.mt-btn').forEach(b=>b.addEventListener('click',()=>{toggleStates[b.dataset.pf][b.dataset.mk]=!toggleStates[b.dataset.pf][b.dataset.mk];mkMixed(cid,tid,labels,dbm,prefix,GM)}));
  killChart(cid);const ctx=G(cid)?.getContext('2d');if(!ctx)return;
  const ds2=[];
  GM.forEach(gm=>{if(!st[gm.k])return;ds2.push({label:gm.l,data:gm.pct?dbm[gm.k]?.map(v=>v*100)||[]:dbm[gm.k]||[],borderColor:gm.color,backgroundColor:gm.type==='bar'?gm.color+'99':gm.color+'18',type:gm.type,yAxisID:gm.yAxis||'y',borderRadius:gm.type==='bar'?3:0,tension:.3,pointRadius:gm.type==='line'?3:0,borderWidth:gm.type==='line'?2:0,order:gm.type==='line'?0:1})});
  const hasY1=ds2.some(d=>d.yAxisID==='y1');
  charts[cid]=new Chart(ctx,{type:'bar',data:{labels,datasets:ds2},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'bottom',labels:{color:'#666660',font:{size:10},padding:10,usePointStyle:true}},tooltip:{callbacks:{label:c=>{const gm=GM.find(g=>g.l===c.dataset.label);return gm?.pct?`${c.dataset.label}: ${c.raw.toFixed(2)}%`:`${c.dataset.label}: ${Math.round(c.raw).toLocaleString('ko-KR')}`}}}},scales:{x:{ticks:{color:'#999990',font:{size:10},maxRotation:45},grid:{display:false}},y:{ticks:{color:'#999990',font:{size:9},callback:v=>Math.round(v).toLocaleString('ko-KR')},grid:{color:'rgba(0,0,0,.08)'}},...(hasY1?{y1:{position:'right',ticks:{color:'#e6a620',font:{size:9},callback:v=>v.toFixed(0)+'%'},grid:{display:false}}}:{})}}})
}

function chartByDate(adRows,salesRows,cid,tid,GM){
  const bd={},sd={};
  adRows.forEach(r=>{const dk=r[0];if(!bd[dk])bd[dk]=[];bd[dk].push(r)});
  if(salesRows)salesRows.forEach(r=>{const dk=r[0];if(!sd[dk])sd[dk]=[];sd[dk].push(r)});
  const dks=Object.keys(bd).sort();const dbm={};GM.forEach(g=>dbm[g.k]=[]);
  dks.forEach(dk=>{
    const m=sumAd(bd[dk]);
    const sr=sd[dk]||[];m.sellIn=sr.reduce((s,r)=>s+pn(r[SI.sellIn]),0);m.sellOut=sr.reduce((s,r)=>s+pn(r[SI.sellOut]),0);
    m.adRatio=m.sellOut>0?m.vatP/m.sellOut:(m.sellIn>0?m.vatP/m.sellIn:0);
    GM.forEach(g=>dbm[g.k].push(m[g.k]));
  });

}

function renderOYRank(){

    if(search){

      if(mb){
        const mwT=trendMap['마녀공장']||{},srT=trendMap[mb]||{};
        const labels=dates.map(d=>{const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()}`});

          {label:mb,data:dates.map(d=>srT[d]||null),borderColor:'#4d8cf5',backgroundColor:'rgba(77,140,245,.1)',tension:.3,pointRadius:3,borderWidth:2,spanGaps:false},
          {label:'마녀공장',data:dates.map(d=>mwT[d]||null),borderColor:'#c83250',backgroundColor:'rgba(200,50,80,.1)',tension:.3,pointRadius:3,borderWidth:2,spanGaps:false}
        ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{x:{ticks:{font:{size:9}},grid:{display:false}},y:{reverse:true,min:1,ticks:{stepSize:10}}}}})}
      }else{G('oyr-chart-area').innerHTML=`<div class="no-data">"${search}" 검색 결과 없음</div>`}
    }else{G('oyr-chart-area').innerHTML=''}
    let h=`<div style="font-size:11px;color:var(--text-3);margin-bottom:6px">기준일: ${latest}</div><div class="tbl-wrap"><table><thead><tr><th style="text-align:left">순위</th><th style="text-align:left">브랜드</th></tr></thead><tbody>`;

    const f=fym(nvR,year,month);const bd={};
    f.forEach(r=>{const dk=r[0];if(!bd[dk])bd[dk]={sales:0,totalOrder:0,existing:0,newCustomer:0,interest:0,alarm:0,lounge:0};bd[dk].sales+=pn(r[1]);bd[dk].totalOrder+=pn(r[2]);bd[dk].existing+=pn(r[3]);bd[dk].newCustomer+=pn(r[4]);bd[dk].interest+=pn(r[5]);bd[dk].alarm+=pn(r[6]);bd[dk].lounge+=pn(r[7])});
    const dks=Object.keys(bd).sort();const dbm={sales:[],newCustomer:[],existing:[]};
    dks.forEach(dk=>{dbm.sales.push(bd[dk].sales);dbm.newCustomer.push(bd[dk].newCustomer);dbm.existing.push(bd[dk].existing)});
    mkMixed('nv-chart','nv-tgl',dks,dbm,'nv',NV_GM);
    setTimeout(()=>{const el=G('nv-tbl');if(!el)return;el.innerHTML='<div class="tbl-wrap"><table><thead><tr><th style="text-align:left">기간</th><th>매출</th><th>전체주문</th><th>기존고객</th><th>신규고객</th><th>관심고객</th><th>알림고객</th><th>라운지</th></tr></thead><tbody>'+dks.map(dk=>`<tr><td>${dk}</td><td>${fw(bd[dk].sales)}</td><td>${fn(bd[dk].totalOrder)}</td><td>${fn(bd[dk].existing)}</td><td>${fn(bd[dk].newCustomer)}</td><td>${fn(bd[dk].interest)}</td><td>${fn(bd[dk].alarm)}</td><td>${fn(bd[dk].lounge)}</td></tr>`).join('')+'</tbody></table></div>'},0);
  }
  renderYMBar('nv-ym',nvR,update);
}

// ═══════════════ 공식몰 ═══════════════
function renderOfficial(){
  const ct=G('tab-official');const gsR=RAW.gsMonthly||[];
  if(!gsR.length){ct.innerHTML='<div class="no-data">데이터 없음</div>';return}
  ct.innerHTML=`<div id="gs-ym"></div><div class="card"><div class="card-h">공식몰 현황</div><div id="gs-tgl"></div><div style="height:300px"><canvas id="gs-chart"></canvas></div>
    <button class="tgl-btn" onclick="this.nextElementSibling.classList.toggle('open')">📊 상세 테이블 ▾</button><div class="tgl-body" id="gs-tbl"></div></div>`;
  const GS_GM=[{k:'sales',l:'매출',color:'#e67e22',type:'bar'},{k:'newVisitor',l:'신규방문자',color:'#2ecc71',type:'bar'},{k:'reVisitor',l:'재방문자',color:'#3498db',type:'bar'}];
  function update(year,month){
    const f=fym(gsR,year,month);const bd={};
    f.forEach(r=>{const dk=r[0];if(!bd[dk])bd[dk]={sales:0,newVisitor:0,reVisitor:0,visitCount:0,totalMember:0};bd[dk].sales+=pn(r[1]);bd[dk].newVisitor+=pn(r[2]);bd[dk].reVisitor+=pn(r[3]);bd[dk].visitCount+=pn(r[4]);bd[dk].totalMember+=pn(r[5])});
    const dks=Object.keys(bd).sort();const dbm={sales:[],newVisitor:[],reVisitor:[]};
    dks.forEach(dk=>{dbm.sales.push(bd[dk].sales);dbm.newVisitor.push(bd[dk].newVisitor);dbm.reVisitor.push(bd[dk].reVisitor)});
    mkMixed('gs-chart','gs-tgl',dks,dbm,'gs',GS_GM);
    setTimeout(()=>{const el=G('gs-tbl');if(!el)return;el.innerHTML='<div class="tbl-wrap"><table><thead><tr><th style="text-align:left">기간</th><th>매출</th><th>신규방문자</th><th>재방문자</th><th>방문횟수</th><th>총회원수</th></tr></thead><tbody>'+dks.map(dk=>`<tr><td>${dk}</td><td>${fw(bd[dk].sales)}</td><td>${fn(bd[dk].newVisitor)}</td><td>${fn(bd[dk].reVisitor)}</td><td>${fn(bd[dk].visitCount)}</td><td>${fn(bd[dk].totalMember)}</td></tr>`).join('')+'</tbody></table></div>'},0);
  }
  renderYMBar('gs-ym',gsR,update);
}

// ═══════════════ 기간 비교 ═══════════════
function renderCompare(){
  const ct=G('tab-compare');const adR=RAW.adDaily||[];const salesR=RAW.salesDaily||[];
  if(!adR.length){ct.innerHTML='<div class="no-data">데이터 없음</div>';return}
  const today=ds(new Date());const pm=new Date();pm.setMonth(pm.getMonth()-1);
  const p1s=ds(new Date(pm.getFullYear(),pm.getMonth(),1));const p1e=ds(new Date(pm.getFullYear(),pm.getMonth()+1,0));
  const p2s=ds(new Date(new Date().getFullYear(),new Date().getMonth(),1));
  ct.innerHTML=`<div class="card"><div class="card-h">기간 비교 분석</div>
    <div class="filters" style="margin-bottom:14px">
      <div class="f-group"><span class="f-label">채널</span><select id="cmp-ch"><option value="all">전체</option>${CHS.map(k=>`<option value="${k}">${CN[k]}</option>`).join('')}</select></div>
    </div>
    <div class="filters" style="margin-bottom:14px">
      <div class="f-group"><span class="f-label">기간 A</span><div style="display:flex;align-items:center;gap:6px"><input type="date" id="cmp-s1" value="${p1s}"/><span class="f-sep">~</span><input type="date" id="cmp-e1" value="${p1e}"/></div></div>
      <div class="f-group"><span class="f-label">기간 B</span><div style="display:flex;align-items:center;gap:6px"><input type="date" id="cmp-s2" value="${p2s}"/><span class="f-sep">~</span><input type="date" id="cmp-e2" value="${today}"/></div></div>
      <div class="f-group"><div style="padding-top:14px"><button class="btn-sm" onclick="runCompare()" style="background:var(--olive-dim);color:var(--olive);border-color:var(--olive)">비교 실행</button></div></div>
    </div>
    <div id="cmp-result"></div></div>`;
}

function runCompare(){
  const s1=G('cmp-s1')?.value,e1=G('cmp-e1')?.value,s2=G('cmp-s2')?.value,e2=G('cmp-e2')?.value;
  const chKey=G('cmp-ch')?.value||'all';
  const adR=RAW.adDaily||[],salesR=RAW.salesDaily||[];
  const chMap={'oliveyoung':'올리브영','naver':'네이버','official':'공식몰'};
  const fp2=(rows,s,e)=>rows.filter(r=>{const d=pd(r[0]);return d&&d>=new Date(s)&&d<=new Date(e+'T23:59:59')&&(chKey==='all'||String(r[AI.ch]||'').includes(chMap[chKey]||chKey))});
  const fs2=(rows,s,e)=>rows.filter(r=>{const d=pd(r[0]);return d&&d>=new Date(s)&&d<=new Date(e+'T23:59:59')});
  const r1=fp2(adR,s1,e1),r2=fp2(adR,s2,e2),s1r=fs2(salesR,s1,e1),s2r=fs2(salesR,s2,e2);
  const m1=sumAd(r1),m2=sumAd(r2);
  const ss1={sellIn:s1r.reduce((s,r)=>s+pn(r[SI.sellIn]),0),sellOut:s1r.reduce((s,r)=>s+pn(r[SI.sellOut]),0)};
  const ss2={sellIn:s2r.reduce((s,r)=>s+pn(r[SI.sellIn]),0),sellOut:s2r.reduce((s,r)=>s+pn(r[SI.sellOut]),0)};
  m1.sellIn=ss1.sellIn;m1.sellOut=ss1.sellOut;m2.sellIn=ss2.sellIn;m2.sellOut=ss2.sellOut;
  const diff=(a,b)=>b?((a-b)/b*100).toFixed(1)+'%':'-';
  const dc=(a,b)=>{const v=parseFloat(diff(a,b));return isNaN(v)?'var(--text-3)':v>=0?'var(--positive)':'var(--negative)'};
  const metrics=[{l:'매출(SELL-IN)',k:'sellIn'},{l:'매출(SELL-OUT)',k:'sellOut'},{l:'광고비(VAT+)',k:'vatP'},{l:'광고매출',k:'purV'},{l:'노출',k:'imp'},{l:'클릭',k:'click'},{l:'구매',k:'pur'},{l:'장바구니',k:'cart'},{l:'ROAS',k:'roasP',pct:true},{l:'CTR',k:'ctr',pct:true}];
  G('cmp-result').innerHTML=`<div class="tbl-wrap"><table><thead><tr><th style="text-align:left">지표</th><th>기간A (${s1}~${e1})</th><th>기간B (${s2}~${e2})</th><th>증감율</th></tr></thead><tbody>${metrics.map(m=>`<tr><td style="text-align:left">${m.l}</td><td>${m.pct?fp(m1[m.k]):fw(m1[m.k])}</td><td>${m.pct?fp(m2[m.k]):fw(m2[m.k])}</td><td style="color:${dc(m2[m.k],m1[m.k])};font-weight:600">${diff(m2[m.k],m1[m.k])}</td></tr>`).join('')}</tbody></table></div>`;
}

// ═══════════════ MAIN ═══════════════
async function loadAllData(){
  G('tab-summary').innerHTML='<div class="loading"><div class="spin"></div><div class="loading-t">데이터를 불러오는 중...</div></div>';
  const allData=await fetchAllDataAPI();
  if(!Object.keys(allData).length){G('tab-summary').innerHTML='<div class="no-data">데이터 로드 실패. 새로고침해주세요.</div>';return}
  RAW.adDaily     =parseSheet(allData['광고_일별']);
  RAW.adMonthly   =parseSheet(allData['광고_월별']);
  RAW.salesDaily  =parseSheet(allData['매출_일별']);
  RAW.salesMonthly=parseSheet(allData['매출_월별']);
  RAW.naverMonthly=parseSheet(allData['네이버_월별']);
  RAW.gsMonthly   =parseSheet(allData['공식몰_월별']);
  RAW.brand       =parseSheet(allData['브랜드랭킹_viz']);
  G('lastUpd').textContent=new Date().toLocaleString('ko-KR',{hour12:false});
  renderSummary();renderKPI();renderOliveyoung();renderOYRank();renderNaver();renderOfficial();renderCompare();
}
</script>
